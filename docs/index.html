<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>HALCYON — breathe with the fireflies</title>
<meta name="description" content="A box-breathing companion. The whole screen is a field of fireflies, and the field breathes with you. One tap to start, zero permissions.">
<link rel="canonical" href="https://halcyon.netslum.io/">
<meta property="og:type" content="website">
<meta property="og:title" content="HALCYON — breathe with the fireflies">
<meta property="og:description" content="A box-breathing companion. The whole screen is a field of fireflies, and the field breathes with you. One tap to start, zero permissions.">
<meta property="og:url" content="https://halcyon.netslum.io/">
<meta property="og:image" content="https://halcyon.netslum.io/og.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://halcyon.netslum.io/og.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#11111b">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HALCYON">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3CradialGradient id='g' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%23CFF7C4'/%3E%3Cstop offset='45%25' stop-color='%23A6E3A1'/%3E%3Cstop offset='100%25' stop-color='%23A6E3A1' stop-opacity='0'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect width='32' height='32' fill='%2311111B'/%3E%3Ccircle cx='16' cy='16' r='14' fill='url(%23g)'/%3E%3C/svg%3E">
<style>
	:root {
		--crust: #11111b;
		--mantle: #181825;
		--base: #1e1e2e;
		--text: #cdd6f4;
		--subtext: #a6adc8;
		--green: #a6e3a1;
		--mono: ui-monospace, 'JetBrains Mono', 'Fira Code', Menlo, Consolas, monospace;
	}
	* { margin: 0; padding: 0; box-sizing: border-box; }
	html, body {
		height: 100%;
		overflow: hidden;
		background: var(--mantle);
		font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
		user-select: none;
		-webkit-user-select: none;
		-webkit-tap-highlight-color: transparent;
	}
	canvas {
		position: fixed;
		inset: 0;
		width: 100%;
		height: 100%;
		display: block;
		cursor: pointer;
	}

	/* corner chrome — barely there, sunk into the night */
	.wordmark {
		position: fixed;
		top: calc(1.4rem + env(safe-area-inset-top, 0px));
		left: calc(1.6rem + env(safe-area-inset-left, 0px));
		font-family: var(--mono);
		font-size: 0.72rem;
		letter-spacing: 0.42em;
		color: var(--subtext);
		opacity: 0.55;
		pointer-events: none;
		transition: opacity 1.2s ease;
	}
	.links {
		position: fixed;
		bottom: calc(1.2rem + env(safe-area-inset-bottom, 0px));
		right: calc(1.5rem + env(safe-area-inset-right, 0px));
		font-family: var(--mono);
		font-size: 0.68rem;
		letter-spacing: 0.08em;
		opacity: 0.5;
		transition: opacity 1.2s ease;
	}
	.links a {
		color: var(--subtext);
		text-decoration: none;
		padding: 0.4em 0.2em;
	}
	.links a:hover { color: var(--green); }
	.links span { color: var(--subtext); opacity: 0.6; padding: 0 0.3em; }
	body.running .wordmark, body.running .links { opacity: 0.16; }

	/* guidance — idle prompt and running phase HUD swap in place */
	.guide {
		position: fixed;
		left: 0;
		right: 0;
		bottom: calc(clamp(3.5rem, 12vh, 8rem) + env(safe-area-inset-bottom, 0px));
		display: flex;
		flex-direction: column;
		align-items: center;
		gap: 0.55rem;
		text-align: center;
		pointer-events: none;
		transition: opacity 0.9s ease;
	}
	#idle .line1 {
		color: var(--text);
		font-size: clamp(1.15rem, 2.4vw, 1.5rem);
		font-weight: 200;
		letter-spacing: 0.22em;
	}
	#idle .line2 {
		color: var(--subtext);
		font-size: clamp(0.72rem, 1.3vw, 0.85rem);
		font-weight: 300;
		letter-spacing: 0.12em;
	}
	#hud .phase {
		color: var(--text);
		font-size: clamp(0.8rem, 1.6vw, 1rem);
		font-weight: 500;
		letter-spacing: 0.55em;
		text-indent: 0.55em; /* recenters letterspaced text */
	}
	#hud .count {
		color: var(--text);
		font-size: clamp(2.6rem, 6vw, 3.6rem);
		font-weight: 100;
		font-variant-numeric: tabular-nums;
		line-height: 1;
	}
	#hud { opacity: 0; }
	body.running #idle { opacity: 0; }
	body.running #hud { opacity: 1; }

	/* og-card mode (?og) — big wordmark over a vivid field, chrome hidden */
	body.og .guide, body.og .links { display: none; }
	body.og .wordmark { display: none; }
	.og-title {
		display: none;
		position: fixed;
		inset: 0;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		gap: 1.1rem;
		pointer-events: none;
		text-align: center;
	}
	body.og .og-title { display: flex; }
	.og-title .big {
		color: var(--text);
		font-size: 4.6rem;
		font-weight: 100;
		letter-spacing: 0.5em;
		text-indent: 0.5em;
	}
	.og-title .tag {
		color: var(--subtext);
		font-size: 1.15rem;
		font-weight: 300;
		letter-spacing: 0.18em;
	}
</style>
</head>
<body>
<canvas id="field"></canvas>

<div class="wordmark">HALCYON</div>

<div class="guide" id="idle">
	<div class="line1">Tap to begin</div>
	<div class="line2">Box breathing &nbsp;·&nbsp; 4–4–4–4</div>
</div>
<div class="guide" id="hud">
	<div class="phase" id="phase">BREATHE IN</div>
	<div class="count" id="count">4</div>
</div>

<div class="og-title">
	<div class="big">HALCYON</div>
	<div class="tag">breathe with the fireflies</div>
</div>

<div class="links">
	<a href="https://github.com/KaraZajac/HALCYON" rel="noopener">source ↗</a><span>·</span><a href="https://netslum.io" rel="noopener">netslum.io</a>
</div>

<script>
(function () {
	'use strict';

	// ---- ported verbatim from breath/BreathCycle.kt --------------------------
	var PHASE_MS = 4000;
	var CYCLE_MS = PHASE_MS * 4;
	var LABELS = ['BREATHE IN', 'HOLD', 'BREATHE OUT', 'HOLD'];

	function easeInOutSine(t) { return -(Math.cos(Math.PI * t) - 1) / 2; }

	function stateAt(elapsedMs) {
		var inCycle = ((elapsedMs % CYCLE_MS) + CYCLE_MS) % CYCLE_MS;
		var phase = Math.min(3, Math.floor(inCycle / PHASE_MS));
		var p = (inCycle % PHASE_MS) / PHASE_MS;
		var fullness = phase === 0 ? easeInOutSine(p)
			: phase === 1 ? 1
			: phase === 2 ? 1 - easeInOutSine(p)
			: 0;
		var secs = Math.min(4, Math.max(1, 4 - Math.floor(p * 4)));
		return { phase: phase, fullness: fullness, seconds: secs };
	}

	// ---- ported from ui/BreathingScreen.kt (hash-stable firefly field) -------
	var TAU = 6.2831855;
	function frac(x) { return x - Math.floor(x); }
	function hash(n) { return frac(Math.sin(n * 127.1 + 31.7) * 43758.545); }

	// Catppuccin Mocha greens from ui/theme/Theme.kt
	var GREEN_EMPTY = [0x3e, 0x5a, 0x4a];
	var GREEN_MID = [0x74, 0xc7, 0x9e];
	var GREEN_FULL = [0xa6, 0xe3, 0xa1];
	var GREEN_PEAK = [0xcf, 0xf7, 0xc4];
	var MINT = [0xb9, 0xf0, 0xc4];
	var CRUST = [0x11, 0x11, 0x1b];

	function mix(a, b, t) {
		return [a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t];
	}
	function rgb(c, a) {
		return 'rgba(' + (c[0] | 0) + ',' + (c[1] | 0) + ',' + (c[2] | 0) + ',' + a + ')';
	}

	var canvas = document.getElementById('field');
	var ctx = canvas.getContext('2d');
	var ogMode = /(\?|&)og(&|=|$)/.test(location.search);
	if (ogMode) document.body.classList.add('og');

	var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

	var W = 0, H = 0, DPR = 1, MIN = 0, COUNT = 420;
	function resize() {
		DPR = Math.min(window.devicePixelRatio || 1, 2.5);
		W = window.innerWidth;
		H = window.innerHeight;
		canvas.width = Math.round(W * DPR);
		canvas.height = Math.round(H * DPR);
		ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
		MIN = Math.min(W, H);
		// Remaster: the field grows with the room it's given (the app is a fixed
		// ~420 on a phone). Deterministic per index, so resizing never reshuffles.
		COUNT = Math.max(420, Math.min(900, Math.round((W * H) / 2400)));
	}
	window.addEventListener('resize', resize, { passive: true });
	resize();

	// Remaster: fireflies render as pre-built radial-gradient sprites drawn with
	// additive blending — a soft luminous core + halo, far richer than the two
	// flat circles the phone GPU budget allowed. Sprites are rebuilt each frame
	// only when the breath's accent colour actually moves (cheap: 4 tiny canvases).
	var SPRITE = 64, SPRITE_R = SPRITE / 2;
	var spriteCanvases = [null, null, null, null];
	var lastAccentKey = '';
	function buildSprite(col) {
		var s = document.createElement('canvas');
		s.width = SPRITE; s.height = SPRITE;
		var g = s.getContext('2d');
		var grad = g.createRadialGradient(SPRITE_R, SPRITE_R, 0, SPRITE_R, SPRITE_R, SPRITE_R);
		grad.addColorStop(0.0, rgb(mix(col, [255, 255, 255], 0.38), 1));
		grad.addColorStop(0.2, rgb(col, 0.9));
		grad.addColorStop(0.5, rgb(col, 0.18));
		grad.addColorStop(1.0, rgb(col, 0));
		g.fillStyle = grad;
		g.fillRect(0, 0, SPRITE, SPRITE);
		return s;
	}
	function refreshSprites(accent) {
		var key = (accent[0] | 0) + ',' + (accent[1] | 0) + ',' + (accent[2] | 0);
		if (key === lastAccentKey) return;
		lastAccentKey = key;
		// colour classes, matching the app: ember-white, mint spark, the living
		// green, deep sage
		spriteCanvases[0] = buildSprite(mix(accent, [255, 255, 255], 0.75));
		spriteCanvases[1] = buildSprite(mix(accent, MINT, 0.6));
		spriteCanvases[2] = buildSprite(accent);
		spriteCanvases[3] = buildSprite(mix(accent, GREEN_EMPTY, 0.45));
	}

	// ---- session state -------------------------------------------------------
	var running = false;
	var nowMs = 0;      // always advancing — the field never freezes
	var breathMs = 0;   // advances only while running — the breath clock
	var runRaw = 0;     // 0..1 ramp over 1.2s, eased into runFactor
	var wakeLock = null;

	function setRunning(on) {
		running = on;
		if (on) breathMs = 0; // clean start on a fresh inhale
		document.body.classList.toggle('running', on);
		if (on && navigator.wakeLock) {
			navigator.wakeLock.request('screen').then(function (l) { wakeLock = l; }).catch(function () {});
		} else if (wakeLock) {
			wakeLock.release().catch(function () {});
			wakeLock = null;
		}
	}
	document.addEventListener('visibilitychange', function () {
		if (!document.hidden && running && navigator.wakeLock) {
			navigator.wakeLock.request('screen').then(function (l) { wakeLock = l; }).catch(function () {});
		}
	});

	canvas.addEventListener('pointerdown', function () { if (!ogMode) setRunning(!running); });
	document.addEventListener('keydown', function (e) {
		if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); if (!ogMode) setRunning(!running); }
	});

	// og-card mode: freeze mid-inhale, vivid, for the share-card screenshot
	if (ogMode) { running = true; runRaw = 1; nowMs = 30000; }

	// ---- HUD (DOM text only touched when it changes) -------------------------
	var phaseEl = document.getElementById('phase');
	var countEl = document.getElementById('count');
	var lastLabel = '', lastCount = -1;

	// ---- the field -----------------------------------------------------------
	var wanderScale = reducedMotion ? 0.35 : 1;

	function draw() {
		var tSec = nowMs / 1000;
		var st = stateAt(ogMode ? 3000 : breathMs);

		var runFactor = easeInOutSine(runRaw);

		// Idle: a slow resting shimmer so the field is alive before a session.
		var idlePulse = 0.42 + 0.14 * Math.sin(tSec * 0.35);
		var fullness = Math.min(1, Math.max(0, idlePulse + (st.fullness - idlePulse) * runFactor));

		var base = fullness < 0.5
			? mix(GREEN_EMPTY, GREEN_MID, fullness / 0.5)
			: mix(GREEN_MID, GREEN_FULL, (fullness - 0.5) / 0.5);
		var crest = Math.min(1, Math.max(0, (fullness - 0.72) / 0.28));
		var accent = mix(base, GREEN_PEAK, 0.55 * crest);
		refreshSprites(accent);

		var breathScale = 0.965 + 0.055 * fullness;
		var bright = 0.45 + 0.55 * fullness;
		var sizeBreath = 0.92 + 0.16 * fullness;

		// night sky — a whisper of a vertical gradient, deeper than the app's
		// flat base so the glows have more room
		var sky = ctx.createLinearGradient(0, 0, 0, H);
		sky.addColorStop(0, '#181825');
		sky.addColorStop(1, '#11111b');
		ctx.globalCompositeOperation = 'source-over';
		ctx.globalAlpha = 1;
		ctx.fillStyle = sky;
		ctx.fillRect(0, 0, W, H);

		ctx.globalCompositeOperation = 'lighter';

		// remaster: slow fog — a few vast, breath-tinted drifts so wide screens
		// feel inhabited edge to edge, not just at the phone-shaped centre
		for (var f = 0; f < 5; f++) {
			var fx = (0.12 + 0.76 * hash(f * 13 + 501)) * W +
				Math.sin(tSec * 0.021 + hash(f + 511) * TAU) * MIN * 0.06 * wanderScale;
			var fy = (0.18 + 0.64 * hash(f * 13 + 503)) * H +
				Math.cos(tSec * 0.017 + hash(f + 513) * TAU) * MIN * 0.05 * wanderScale;
			var fr = MIN * (0.30 + 0.22 * hash(f * 13 + 505));
			var fa = (0.012 + 0.030 * fullness) * (0.5 + 0.5 * hash(f + 517));
			var fg = ctx.createRadialGradient(fx, fy, 0, fx, fy, fr);
			fg.addColorStop(0, rgb(accent, fa));
			fg.addColorStop(1, rgb(accent, 0));
			ctx.fillStyle = fg;
			ctx.fillRect(fx - fr, fy - fr, fr * 2, fr * 2);
		}

		// 1. the vast, edgeless bloom at the heart of the field
		var cx = W / 2, cy = H / 2;
		var bloomR = MIN * (0.40 + 0.12 * fullness);
		var bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, bloomR);
		bg.addColorStop(0, rgb(accent, 0.03 + 0.09 * fullness));
		bg.addColorStop(1, rgb(accent, 0));
		ctx.fillStyle = bg;
		ctx.fillRect(cx - bloomR, cy - bloomR, bloomR * 2, bloomR * 2);

		// 2. the fireflies
		var margin = MIN * 0.05;
		var span = H + 2 * margin;
		for (var i = 0; i < COUNT; i++) {
			var d = hash(i * 7 + 1);
			var d2 = d * d;

			var rise = 0.004 + 0.010 * d;
			var yN = frac(hash(i * 7 + 3) - tSec * rise);
			var xN = hash(i * 7 + 2);

			var wAmp = MIN * (0.006 + 0.020 * d) * wanderScale;
			var p1 = hash(i * 7 + 4) * TAU;
			var p2 = hash(i * 7 + 5) * TAU;
			var sp = 0.05 + 0.14 * hash(i * 7 + 6);
			var wx = Math.sin(tSec * sp + p1) + 0.5 * Math.sin(tSec * 0.31 + p2);
			var wy = Math.cos(tSec * sp * 0.83 + p2) + 0.5 * Math.sin(tSec * 0.23 + p1);

			var x = xN * W + wx * wAmp;
			var y = yN * span - margin + wy * wAmp;

			x = cx + (x - cx) * breathScale;
			y = cy + (y - cy) * breathScale;

			var seam = Math.min(1, Math.min(yN, 1 - yN) / 0.07);

			var blink = 0.5 + 0.5 * Math.sin(tSec * (0.35 + 0.75 * hash(i + 107)) + hash(i + 109) * TAU);
			var glow = blink * blink;

			var ff = frac(tSec * (0.0045 + 0.0055 * hash(i + 121)) + hash(i + 123));
			var flare = Math.max(0, 1 - Math.abs(ff - 0.035) / 0.035);

			var a = (0.08 + 0.62 * glow) * (0.30 + 0.70 * d2) * bright * seam +
				0.55 * flare * bright * seam;
			if (a <= 0.004) continue;
			a = Math.min(1, a) * 0.9; // additive blending needs a touch less

			var sz = MIN * (0.0012 + 0.0050 * d) * sizeBreath * (1 + 1.1 * flare);

			var cr = hash(i + 131);
			var sprite = spriteCanvases[cr > 0.94 ? 0 : cr > 0.70 ? 1 : cr > 0.30 ? 2 : 3];

			// sprite core reads ≈ sz; the gradient skirt is the halo
			var ds = sz * 9;
			ctx.globalAlpha = a;
			ctx.drawImage(sprite, x - ds / 2, y - ds / 2, ds, ds);
			if (d > 0.72) {
				// near fireflies carry an extra wide halo, like the app
				var dh = ds * 2.1;
				ctx.globalAlpha = a * 0.16;
				ctx.drawImage(sprite, x - dh / 2, y - dh / 2, dh, dh);
			}
		}

		// 3. vignette — the edges sink into the night
		ctx.globalCompositeOperation = 'source-over';
		ctx.globalAlpha = 1;
		var vr = Math.max(W, H) * 0.72;
		var vg = ctx.createRadialGradient(cx, cy, vr * 0.35, cx, cy, vr);
		vg.addColorStop(0, rgb(CRUST, 0));
		vg.addColorStop(1, rgb(CRUST, 0.55));
		ctx.fillStyle = vg;
		ctx.fillRect(0, 0, W, H);

		// HUD text
		if (running && !ogMode) {
			var label = LABELS[st.phase];
			if (label !== lastLabel) { lastLabel = label; phaseEl.textContent = label; }
			if (st.seconds !== lastCount) { lastCount = st.seconds; countEl.textContent = st.seconds; }
		}
	}

	// installable: register the offline service worker
	if ('serviceWorker' in navigator && location.protocol === 'https:') {
		window.addEventListener('load', function () {
			navigator.serviceWorker.register('/sw.js').catch(function () {});
		});
	}

	var last = 0;
	function frame(t) {
		if (last !== 0) {
			var dt = Math.min(t - last, 100); // clamp so a background tab can't jump
			nowMs += dt;
			if (running) breathMs += dt;
			runRaw = Math.min(1, Math.max(0, runRaw + (running ? dt : -dt) / 1200));
		}
		last = t;
		draw();
		requestAnimationFrame(frame);
	}
	requestAnimationFrame(frame);
})();
</script>
</body>
</html>
